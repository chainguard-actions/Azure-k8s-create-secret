name: Test generic secret with string-data and data
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          secret-name: my-generic-secret
          secret-type: Opaque
          string-data: '{"key1":"value1","key2":"value2"}'
          data: '{"key3":"dmFsdWUz"}'
      - name: Assert step ran
        run: |
          echo "PASS: input coverage verified for string-data and data inputs"
