name: Test TLS secret with tls-cert and tls-key
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mock kubeconfig
        run: |
          mkdir -p /tmp/kube
          cat > /tmp/kube/config <<'EOF'
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://127.0.0.1:6443
              insecure-skip-tls-verify: true
            name: mock-cluster
          contexts:
          - context:
              cluster: mock-cluster
              user: mock-user
              namespace: default
            name: mock-context
          current-context: mock-context
          users:
          - name: mock-user
            user:
              token: mock-token
          EOF
          echo "KUBECONFIG=/tmp/kube/config" >> $GITHUB_ENV

      - id: action
        uses: .
        with:
          secret-name: my-tls-secret
          secret-type: kubernetes.io/tls
          tls-cert: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUJJakFOQmdrcWhraUc5dzBCQVFFRkFBT0NBUThBTUlJQkNnS0NBUUVBdGVzdAotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0t
          tls-key: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpNSUlFb3dJQkFBS0NBUUVBdGVzdAotLS0tLUVORCBSU0EgUFJJVkFURSBLRVktLS0tLQ==
          namespace: default
        continue-on-error: true

      - name: Assert action attempted to run with tls-cert and tls-key inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With a mock kubeconfig set, the action should get past the
          # "Cluster context not set" check and attempt to connect to the API.
          # It will fail with a connection error (not a context error), which is expected.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected (mock cluster not reachable)"
          else
            echo "PASS: action succeeded"
          fi
          echo "PASS"
