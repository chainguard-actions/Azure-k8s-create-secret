name: Test docker-registry secret with all registry inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up fake kubeconfig
        run: |
          mkdir -p $HOME/.kube
          cat > $HOME/.kube/config <<'EOF'
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://127.0.0.1:6443
            name: fake-cluster
          contexts:
          - context:
              cluster: fake-cluster
              user: fake-user
              namespace: default
            name: fake-context
          current-context: fake-context
          users:
          - name: fake-user
            user:
              token: fake-token
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          secret-name: my-registry-secret
          secret-type: kubernetes.io/dockerconfigjson
          container-registry-url: myregistry.azurecr.io
          container-registry-username: myuser
          container-registry-password: mypassword
          container-registry-email: myuser@example.com
          data: '{"key1":"dmFsdWUx"}'
      - name: Assert secret-name output
        env:
          SECRET_NAME: ${{ steps.action.outputs.secret-name }}
        run: |
          echo "secret-name output: $SECRET_NAME"
          if [ "$SECRET_NAME" != "my-registry-secret" ]; then
            echo "FAIL: expected secret-name output to be 'my-registry-secret', got '$SECRET_NAME'"
            exit 1
          fi
          echo "PASS"
