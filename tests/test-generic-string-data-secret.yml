name: Test generic secret with string-data
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          secret-name: my-generic-secret
          secret-type: generic
          string-data: '{"key1":"value1","key2":"value2"}'
      - name: Assert action ran (may fail without cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action will fail without a real Kubernetes cluster,
          # but we verify it was invoked and produced an outcome
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action was invoked"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
